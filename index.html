<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدماتي</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

/* العنوان */
.container {
  padding: 60px 20px;
}

h1 {
  font-size: 40px;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: #00c896;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

/* الكروت */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 40px;
}

.card {
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 15px;
  width: 250px;
}

/* ===== السلايدر ===== */
.slider {
  margin-top: 60px;
  overflow: hidden;
  width: 100%;
}

.slides {
  display: flex;
  gap: 20px;
  transition: transform 0.5s ease;
  justify-content: center;
}

.slides img {
  width: 180px;
  height: 350px;
  border-radius: 20px;
  object-fit: cover;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}
</style>

</head>

<body>

<div class="container">
  <h1>تطبيق خدماتي</h1>
  <p>منصة لتسهيل الوصول إلى الخدمات بسهولة</p>
  <button class="btn">تحميل التطبيق</button>
</div>

<div class="cards">
  <div class="card">
    <h3>🚀 السرعة</h3>
    <p>تنفيذ سريع وسهل</p>
  </div>

  <div class="card">
    <h3>⚡ المميزات</h3>
    <p>تصفح - طلب - متابعة</p>
  </div>

  <div class="card">
    <h3>📌 نبذة</h3>
    <p>يوفر التطبيق خدمات متعددة بسهولة</p>
  </div>
</div>

<h2 style="margin-top:50px;">📱 صور التطبيق</h2>

<div class="slider">
  <div class="slides" id="slides">
    <img src="screen1.png.jpeg">
    <img src="screen2.png.jpeg">
    <img src="screen3.png.jpeg">
    <img src="screen4.png.jpeg">
  </div>
</div>

<script>
let index = 0;
const slides = document.getElementById("slides");
const total = slides.children.length;

setInterval(() => {
  index++;
  if (index >= total) {
    index = 0;
  }
  slides.style.transform = `translateX(-${index * 200}px)`;
}, 1000);
</script>

</body>
</html>
