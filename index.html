<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدماتي</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

/* العنوان */
.container {
  padding: 60px 20px;
}

h1 {
  font-size: 40px;
}

/* زر التحميل */
.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: linear-gradient(135deg, #00ffcc, #00c896);
  border: none;
  border-radius: 12px;
  color: black;
  font-size: 18px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00ffcc;
}

/* الكروت */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 40px;
}

.card {
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 15px;
  width: 250px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px rgba(0,255,200,0.3);
}

/* السلايدر */
.slider {
  margin-top: 60px;
  display: flex;
  justify-content: center;
}

.slider img {
  width: 220px;
  height: 420px;
  border-radius: 25px;
  object-fit: cover;
  box-shadow: 0 15px 30px rgba(0,0,0,0.6);
  transition: opacity 0.5s ease;
}
</style>

</head>

<body>

<div class="container">
  <h1>تطبيق خدماتي</h1>
  <p>منصة لتسهيل الوصول إلى الخدمات بسهولة</p>

  <!-- زر التحميل -->
  <a href="https://drive.google.com/uc?export=download&id=1wl8aihSbRCDGnSmVbrjHEjy8b6rWFi0H" class="btn">
    🚀 تحميل التطبيق
  </a>
</div>

<div class="cards">
  <div class="card">
    <h3>🚀 السرعة</h3>
    <p>تنفيذ سريع وسهل</p>
  </div>

  <div class="card">
    <h3>⚡ المميزات</h3>
    <p>تصفح - طلب - متابعة</p>
  </div>

  <div class="card">
    <h3>📌 نبذة</h3>
    <p>يوفر التطبيق خدمات متعددة بسهولة</p>
  </div>
</div>

<h2 style="margin-top:50px;">📱 صور التطبيق</h2>

<div class="slider">
  <img id="sliderImage" src="screen1.png.jpeg">
</div>

<script>
const images = [
  "screen1.png.jpeg",
  "screen2.png.jpeg",
  "screen3.png.jpeg",
  "screen4.png.jpeg"
];

let index = 0;
const slider = document.getElementById("sliderImage");

setInterval(() => {
  slider.style.opacity = 0;

  setTimeout(() => {
    index++;
    if (index >= images.length) index = 0;

    slider.src = images[index];
    slider.style.opacity = 1;
  }, 500);

}, 2000); // كل صورتين ثانية
</script>

</body>
</html>
