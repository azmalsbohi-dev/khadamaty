<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدماتي</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

/* العنوان */
.container {
  padding: 60px 20px;
}

h1 {
  font-size: 40px;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: #00c896;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

/* الكروت */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 40px;
}

.card {
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 15px;
  width: 250px;
}

/* ===== السلايدر (صورة واحدة) ===== */
.slider {
  margin-top: 60px;
  display: flex;
  justify-content: center;
}

.slider img {
  width: 200px;
  height: 400px;
  border-radius: 20px;
  object-fit: cover;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  transition: opacity 0.5s ease;
}
</style>

</head>

<body>

<div class="container">
  <h1>تطبيق خدماتي</h1>
  <p>منصة لتسهيل الوصول إلى الخدمات بسهولة</p>
  <button class="btn">تحميل التطبيق</button>
</div>

<div class="cards">
  <div class="card">
    <h3>🚀 السرعة</h3>
    <p>تنفيذ سريع وسهل</p>
  </div>

  <div class="card">
    <h3>⚡ المميزات</h3>
    <p>تصفح - طلب - متابعة</p>
  </div>

  <div class="card">
    <h3>📌 نبذة</h3>
    <p>يوفر التطبيق خدمات متعددة بسهولة</p>
  </div>
</div>

<h2 style="margin-top:50px;">📱 صور التطبيق</h2>

<div class="slider">
  <img id="sliderImage" src="screen1.png.jpeg">
</div>

<script>
const images = [
  "screen1.png.jpeg",
  "screen2.png.jpeg",
  "screen3.png.jpeg",
  "screen4.png.jpeg"
];

let index = 0;
const slider = document.getElementById("sliderImage");

setInterval(() => {
  slider.style.opacity = 0;

  setTimeout(() => {
    index++;
    if (index >= images.length) index = 0;

    slider.src = images[index];
    slider.style.opacity = 1;
  }, 500);

}, 1500);
</script>

</body>
</html>
